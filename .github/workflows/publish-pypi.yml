name: publish-pypi
# Builds the hedra-python distribution from the committed SDK and publishes to PyPI.
# Triggered when a GitHub Release is published. Requires the PYPI_TOKEN secret.
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Bootstrap poetry
        run: curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1

      - name: Build
        run: poetry build

      - name: Publish to PyPI
        env:
          # Accept either secret name (the Stainless workflow used HEDRA_PYPI_TOKEN).
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN || secrets.HEDRA_PYPI_TOKEN }}
        run: poetry publish
