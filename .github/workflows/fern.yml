name: fern
# - check:      validates the Fern API definition on every PR.
# - up-to-date: regenerates the SDK and fails if the committed code is stale, so the
#               checked-in SDK always matches fern/ (spec + overrides + generators.yml).
# - regenerate: on demand, regenerates and opens a PR.
# All generation runs the Python generator via Docker, which works natively on Linux
# runners (the colima /private bind-mount issue is local-Mac-only).
on:
  pull_request: {}
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install Fern
        run: npm install -g fern-api
      - name: Check Fern config
        run: fern check

  up-to-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install Fern
        run: npm install -g fern-api
      - name: Regenerate SDK
        run: |
          VER="$(grep -m1 '^version = ' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')"
          fern generate --local --group local --version "$VER" --force --no-prompt
          python3 fern/postprocess.py
      - name: Fail if generated code is out of date
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            echo "::error::Committed SDK is out of date with fern/. Run the 'fern' workflow (regenerate) or 'fern generate --local --group local'."
            git diff --cached --stat
            exit 1
          fi

  regenerate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install Fern
        run: npm install -g fern-api
      - name: Regenerate SDK
        run: |
          VER="$(grep -m1 '^version = ' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')"
          fern generate --local --group local --version "$VER" --force --no-prompt
          python3 fern/postprocess.py
      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: regenerate SDK from Fern"
          title: "chore: regenerate SDK from Fern"
          body: "Automated SDK regeneration via `fern generate`."
          branch: fern/regenerate
          delete-branch: true
