# Fern OpenAPI overrides (deep-merged onto openapi.json). Keeps the upstream spec
# pristine while polishing the SDK surface.
#  - Flattens the `Public` tag group onto the root client.
#  - Gives methods clean names matching the API reference.
#  - Adds HEDRA_API_KEY env-var fallback for auth.
#  - Replaces the `paging_params` object query param with flat limit/offset.
components:
  securitySchemes:
    APIKeyHeader:
      x-fern-header:
        name: api_key
        env: HEDRA_API_KEY
paths:
  /models:
    get:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: list_models
  /voices:
    get:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: list_voices
  /assets:
    get:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: list_assets
    post:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: create_asset
  /assets/{id}/upload:
    post:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: upload_asset
  /generations:
    get:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: list_generations
      # paging_params is flattened to limit/offset directly in openapi.json — Fern
      # merges override `parameters` arrays by index, which can't cleanly replace it.
    post:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: generate_asset
  /generations/{generation_id}/status:
    get:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: get_status
  /billing/credits:
    get:
      x-fern-sdk-group-name: []
      x-fern-sdk-method-name: get_credits
